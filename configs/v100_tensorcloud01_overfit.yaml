# Single-domain, single-batch TensorCloud01 overfit gate.
# Run with: python scripts/train.py --config configs/v100_tensorcloud01_overfit.yaml --fast-dev
# This is an implementation sanity check only; it is not a scientific result.
data:
  root: /data/mdcath
  manifest: /data/mdcath/manifest.json
  domains: [1a0hA01]
  temperatures: [320]
  replicas: [0]
  delta_frames: 1
  crop_length: 128
  val_fraction: 0.0
  noise_sigma: 0.1
  unroll: 1
  canon_symmetric: true
  max_open_files: 4
  seed: 0
model:
  hidden: 32
  vector_channels: 32
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0
  source_noise_v: true
  vector_qk: false
  tensor_qkv: false
  paper_ff: false
  tensor_cloud01: true
train:
  batch_size: 1
  grad_accum: 1
  lr: 5.0e-3
  lr_final: 5.0e-3
  warmup_steps: 0
  grad_clip: 0.1
  max_steps: 300
  val_every: 300
  log_every: 50
  ckpt_every: 300
  keep_last_k: 1
  huber_delta: 1.0
  w_ca: 0.0
  w_bond: 0.0
  w_bond_unroll: 0.0
  w_geom_length_unroll: 0.0
  w_geom_angle_unroll: 0.0
  w_offset: 0.0
  w_allatom: 1.0
  w_unroll: 0.0
  amp: false
  amp_dtype: fp16
  num_workers: 0
  device: cuda
  out_dir: runs/v100_tensorcloud01_overfit
  seed: 0
