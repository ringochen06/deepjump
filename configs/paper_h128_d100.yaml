# Near-paper-scale DeepJump reproduction (NVIDIA GPU + DDP), delta = 100 ns.
# Paper recipe: H=128, Nh=4, 6+6 layers, crop 256, global batch 128, Adam lr 5e-3->3e-3,
# grad-clip 0.1, 500k steps, 25 A all-atom Vector-Map loss, all 5 temps x 5 replicas.
# Effective batch = batch_size * world_size * grad_accum. Example below targets 128 on 8 GPUs
# (2 * 8 * 8 = 128). TUNE batch_size/grad_accum to your GPU memory (all-atom loss @ crop 256
# is memory-heavy; on 80 GB A100/A800 start with batch_size 2).
data:
  root: /data/mdcath                 # local NVMe (data synced from OBS); see cloud/huawei/HUAWEI_CLOUD_PLAN.md
  manifest: /data/mdcath/manifest.json   # build once: python scripts/build_manifest.py --root /data/mdcath
  domains: []                        # [] => all domains in the manifest
  temperatures: [320, 348, 379, 413, 450]
  replicas: [0, 1, 2, 3, 4]
  delta_frames: 100
  crop_length: 256
  val_fraction: 0.02                 # ~100 held-out domains at full scale
  noise_sigma: 0.1
  unroll: 1                          # pure DeepJump (no self-conditioning crutch)
  canon_symmetric: true
  max_open_files: 96
  seed: 0

model:
  hidden: 128
  vector_channels: 64
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0

train:
  batch_size: 2                      # per GPU
  grad_accum: 8                      # 2 * 8 GPUs * 8 = effective 128
  lr: 5.0e-3
  lr_final: 3.0e-3
  warmup_steps: 2000
  grad_clip: 0.1
  max_steps: 500000
  val_every: 2000
  log_every: 100
  ckpt_every: 10000
  keep_last_k: 5
  huber_delta: 1.0
  w_offset: 0.0
  w_allatom: 1.0                     # 25 A all-atom Vector-Map loss (the paper's loss)
  w_unroll: 0.0
  amp: true
  amp_dtype: bf16                    # A100/A800; use fp16 on V100
  num_workers: 12
  device: cuda
  out_dir: runs/paper_h128_d100
  seed: 0
