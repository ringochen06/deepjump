# Paper-horizon arm. Relative to the matched control, only
# lr_horizon_steps and out_dir differ. Train continuously from fresh
# initialization to step 2000; never resume or warm-start.
data:
  root: /data/mdcath
  manifest: /data/mdcath/manifest.json
  domains: []
  temperatures: [320, 348, 379, 413, 450]
  replicas: [0, 1, 2, 3, 4]
  delta_frames: 1
  crop_length: 256
  val_fraction: 0.02
  noise_sigma: 0.1
  unroll: 1
  canon_symmetric: true
  max_open_files: 96
  seed: 0
model:
  hidden: 128
  vector_channels: 128
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0
  source_noise_v: true
  vector_qk: false
  tensor_qkv: false
  paper_ff: false
  tensor_cloud01: true
  tensor_cloud01_vector_only_attention: false
train:
  batch_size: 2
  grad_accum: 8
  lr: 5.0e-3
  lr_final: 3.0e-3
  warmup_steps: 200
  lr_horizon_steps: 500000
  grad_clip: 0.1
  max_steps: 2000
  val_every: 100
  log_every: 50
  ckpt_every: 1000
  keep_last_k: 2
  huber_delta: 1.0
  w_ca: 0.0
  w_bond: 0.0
  w_bond_unroll: 0.0
  w_geom_length_unroll: 0.0
  w_geom_angle_unroll: 0.0
  w_offset: 0.0
  w_allatom: 1.0
  w_unroll: 0.0
  amp: false
  amp_dtype: fp16
  num_workers: 8
  device: cuda
  out_dir: runs/v100_tensorcloud01_full_d1_fp32_paper_horizon500k_2000
  seed: 0
