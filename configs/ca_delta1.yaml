# DeepJump-lite: Ca-only, delta = 1 ns. Small config that trains on a laptop (MPS).
data:
  root: ~/hkucds/data/mdcath
  domains: []          # empty => discover all *.h5 under root
  temperatures: [320]
  replicas: [0]
  delta_frames: 1      # 1 frame == 1 ns
  crop_length: 128
  val_fraction: 0.2
  noise_sigma: 0.1
  seed: 0

model:
  hidden: 32
  vector_channels: 16
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0

train:
  batch_size: 4
  lr: 1.0e-3
  grad_clip: 0.1
  max_steps: 500
  val_every: 50
  log_every: 10
  huber_delta: 1.0
  device: auto
  out_dir: runs/ca_delta1
  seed: 0
