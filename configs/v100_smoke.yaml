# Single-GPU SMOKE test for V100 16GB (NOT a training run). ~15 domains, 60 steps.
# Same per-GPU memory footprint as v100_h128_d1.yaml (H=128, crop 128, batch 1, fp16, offset
# loss) so it measures the real peak GPU memory + step time, but stops in seconds-minutes.
# effective batch here = 1 (batch 1 x world 1 x accum 1) -- do NOT expect 128 on a single card.
data:
  root: /data/mdcath
  manifest: /data/mdcath/manifest.json   # build with scripts/build_manifest.py before running
  domains: []               # use whatever few domains are downloaded (~15)
  temperatures: [320]       # single temperature keeps the smoke tiny
  replicas: [0]
  delta_frames: 1
  crop_length: 128
  val_fraction: 0.2
  noise_sigma: 0.1
  unroll: 1
  canon_symmetric: true
  max_open_files: 32
  seed: 0

model:
  hidden: 128
  vector_channels: 64
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0

train:
  batch_size: 1
  grad_accum: 1             # smoke: no accumulation (effective batch = 1)
  lr: 5.0e-3
  lr_final: 3.0e-3
  warmup_steps: 10
  grad_clip: 0.1
  max_steps: 60
  val_every: 30
  log_every: 5
  ckpt_every: 60
  keep_last_k: 1
  huber_delta: 1.0
  w_offset: 1.0
  w_allatom: 0.0
  amp: true
  amp_dtype: fp16
  num_workers: 4
  device: cuda
  out_dir: runs/v100_smoke
  seed: 0
