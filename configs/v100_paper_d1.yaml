# Closer-to-paper V100 config (8x V100 16GB): crop 256, all-atom Vector-Map loss ONLY
# (w_ca=w_offset=0, w_allatom=1), fp16, per-GPU batch 16. Effective batch on 8 GPUs = 16*8*1 = 128.
# Measured on 1x V100 16GB (real 257-residue domain, batch 16): ~9.7 GB alloc / ~10.6 GB reserved,
# ~156 ms/step, GPU util ~94%, no NaN/OOM. NOT "fully faithful" (GVP not e3nn-l2; ODE-only) but a
# faithful *loss + scale* setting. delta=10/100 via delta_frames.
data:
  root: /data/mdcath
  manifest: /data/mdcath/manifest.json
  domains: []
  temperatures: [320, 348, 379, 413, 450]
  replicas: [0, 1, 2, 3, 4]
  delta_frames: 1
  crop_length: 256
  val_fraction: 0.02
  noise_sigma: 0.1
  unroll: 1
  canon_symmetric: true
  max_open_files: 96
  seed: 0

model:
  hidden: 128
  vector_channels: 64
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0

train:
  batch_size: 16          # per GPU; measured 9.7 GB alloc / 10.6 GB reserved on 16 GB
  grad_accum: 1           # 16 * 8 GPUs * 1 = effective 128
  lr: 5.0e-3
  lr_final: 3.0e-3
  warmup_steps: 2000
  grad_clip: 0.1
  max_steps: 100000       # bounded run; raise toward 500000 for the full schedule
  val_every: 2000
  log_every: 100
  ckpt_every: 5000
  keep_last_k: 5
  huber_delta: 1.0
  w_ca: 0.0               # all-atom loss only (CA is already in the all-atom set)
  w_offset: 0.0
  w_allatom: 1.0
  amp: true
  amp_dtype: fp16         # V100 = fp16 (no bf16)
  num_workers: 8
  device: cuda
  out_dir: runs/v100_paper_d1
  seed: 0
