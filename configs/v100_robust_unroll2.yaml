# Bounded off-manifold diagnostic: honest tau=0 two-step self-conditioning.
data:
  root: /data/mdcath
  manifest: /data/mdcath/manifest.json
  domains: []
  temperatures: [320, 348, 379, 413, 450]
  replicas: [0, 1, 2, 3, 4]
  delta_frames: 1
  crop_length: 256
  val_fraction: 0.02
  noise_sigma: 0.1
  unroll: 2
  canon_symmetric: true
  max_open_files: 96
  seed: 0

model:
  hidden: 128
  vector_channels: 64
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0

train:
  batch_size: 8
  grad_accum: 2
  lr: 5.0e-3
  lr_final: 3.0e-3
  warmup_steps: 200
  grad_clip: 0.1
  max_steps: 500
  val_every: 250
  log_every: 100
  ckpt_every: 250
  keep_last_k: 2
  huber_delta: 1.0
  w_ca: 0.0
  w_offset: 0.0
  w_allatom: 1.0
  w_unroll: 0.5
  amp: true
  amp_dtype: fp16
  num_workers: 8
  device: cuda
  out_dir: runs/v100_robust_unroll2
  seed: 0
