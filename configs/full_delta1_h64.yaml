# DeepJump-lite: hidden-dim sweep, H=64 (vs H=32 baseline). Ca + heavy, delta=1 ns.
data:
  root: ~/hkucds/data/mdcath
  domains: []
  temperatures: [320]
  replicas: [0]
  delta_frames: 1
  crop_length: 128
  val_fraction: 0.2
  noise_sigma: 0.1
  unroll: 1
  seed: 0

model:
  hidden: 64
  vector_channels: 32
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0

train:
  batch_size: 4
  lr: 1.0e-3
  grad_clip: 0.1
  max_steps: 6000
  val_every: 250
  log_every: 25
  huber_delta: 1.0
  w_offset: 1.0
  w_allatom: 0.0
  w_unroll: 0.0
  device: auto
  out_dir: runs/full_delta1_h64
  seed: 0
