# 8x V100 100-step DDP SMOKE (NOT a training run). Byte-for-byte the same memory footprint as
# configs/v100_paper_d1.yaml (crop 256, batch 16, grad_accum 1, fp16, all-atom loss only) so the
# peak-GPU reading is exactly the formal run's; ONLY max_steps/val_every/ckpt_every are shortened.
# Purpose: on the freshly rented 8-GPU instance, confirm in ~minutes that (a) all 8 ranks sync via
# NCCL, (b) per-GPU memory fits 16 GB, (c) DistributedSampler shards the real 5-temp x 5-replica
# data, (d) a checkpoint is written mid-run. Launch: CONFIG=configs/v100_ddp_smoke.yaml bash cloud/run_ddp.sh
data:
  root: /data/mdcath
  manifest: /data/mdcath/manifest.json
  domains: []
  temperatures: [320, 348, 379, 413, 450]
  replicas: [0, 1, 2, 3, 4]
  delta_frames: 1
  crop_length: 256
  val_fraction: 0.02
  noise_sigma: 0.1
  unroll: 1
  canon_symmetric: true
  max_open_files: 96
  seed: 0

model:
  hidden: 128
  vector_channels: 64
  num_heads: 4
  cond_layers: 6
  transport_layers: 6
  seq_embed_ks: 32
  num_dist_basis: 16
  dist_cutoff: 25.0
  predict_heavy: true
  input_aug_sigma: 0.0

train:
  batch_size: 16          # per GPU; identical to v100_paper_d1 (measured 9.7 GB alloc / 10.6 GB reserved)
  grad_accum: 1           # 16 * 8 GPUs * 1 = effective 128
  lr: 5.0e-3
  lr_final: 3.0e-3
  warmup_steps: 2000
  grad_clip: 0.1
  max_steps: 100          # smoke: shortened from 100000
  val_every: 50           # smoke: shortened from 2000
  log_every: 100
  ckpt_every: 50          # smoke: shortened from 5000 -> writes a checkpoint mid-run (step 50 & 100)
  keep_last_k: 5
  huber_delta: 1.0
  w_ca: 0.0               # all-atom loss only (CA is already in the all-atom set)
  w_offset: 0.0
  w_allatom: 1.0
  amp: true
  amp_dtype: fp16         # V100 = fp16 (no bf16)
  num_workers: 8
  device: cuda
  out_dir: runs/v100_ddp_smoke
  seed: 0
